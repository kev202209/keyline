<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:;">
    <title>Keyline Type</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="workbench" aria-label="Typing test">
        <header class="app-header">
          <div class="brand-lockup">
            <div class="brand-mark" aria-hidden="true">K</div>
            <div>
              <p class="eyebrow">Keyline Type</p>
              <h1>practice</h1>
            </div>
          </div>

          <div class="toolbar" aria-label="Test controls">
            <div class="segmented" role="group" aria-label="Duration">
              <button class="time-option is-active" type="button" data-duration="15">15s</button>
              <button class="time-option" type="button" data-duration="30">30s</button>
              <button class="time-option" type="button" data-duration="60">60s</button>
            </div>
            <button id="restartButton" class="icon-button" type="button" title="New test" aria-label="New test">new</button>
          </div>
        </header>

        <section class="session-panel" aria-label="Current session">
          <div class="session-header">
            <div>
              <p id="sessionStatus" class="session-status">ready</p>
              <div class="timer-track" aria-hidden="true">
                <span id="timerProgress"></span>
              </div>
            </div>
            <div class="timer-block" aria-live="polite">
              <span id="timer" class="timer-value">15</span>
              <span class="timer-label">sec</span>
            </div>
          </div>

          <div class="meter-row" aria-live="polite">
            <div class="metric-tile">
              <span id="liveWpm" class="metric-value">0</span>
              <span class="metric-label">live wpm</span>
            </div>
            <div class="metric-tile">
              <span id="liveAccuracy" class="metric-value">100</span>
              <span class="metric-label">accuracy</span>
            </div>
            <div class="metric-tile">
              <span id="resultRaw" class="metric-value">--</span>
              <span class="metric-label">raw</span>
            </div>
          </div>

          <button id="typingSurface" class="typing-surface" type="button" aria-label="Typing area">
            <span id="wordStream" class="word-stream"></span>
            <span id="caret" class="caret" aria-hidden="true"></span>
          </button>
        </section>

        <textarea id="typingInput" class="typing-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" aria-label="Typing input"></textarea>

        <footer class="result-strip" aria-live="polite">
          <div class="result-block primary-result">
            <span id="resultWpm" class="result-number">--</span>
            <span class="metric-label">final wpm</span>
          </div>
          <div class="result-block">
            <span id="resultAccuracy" class="result-number">--</span>
            <span class="metric-label">accuracy</span>
          </div>
          <div class="result-block wide-result">
            <span id="resultChars" class="result-number">--</span>
            <span class="metric-label">correct / missed / extra</span>
          </div>
        </footer>
      </section>

      <aside class="history-panel" aria-label="Typing history">
        <div class="history-heading">
          <div>
            <p class="eyebrow">local</p>
            <h2>history</h2>
          </div>
          <button id="clearHistoryButton" class="text-button" type="button">clear</button>
        </div>
        <div id="bestLine" class="best-line">No saved runs yet</div>
        <div id="historyList" class="history-list"></div>
        <p id="storagePath" class="storage-path"></p>
      </aside>
    </main>

    <script src="../../dist/src/shared/typing.js"></script>
    <script src="../../dist/src/renderer/app.js"></script>
  </body>
</html>
